    <!-- ローディング画面の公式ロゴを先読みし、初回ブートで一瞬ロゴが欠けるのを防ぐ
         (BrandLogo と同一 URL なので二重取得や未使用 preload 警告は起きない) -->
    <link
      rel="preload"
      as="image"
      href="/unidrop-demo/branding/logo/unidrop-logo-v2.png?v=20260528-2"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Web フォント CSS は非同期ロードにする（URL・ファミリー・ウェイトは従来と同一）。
      同期 <link rel="stylesheet"> だと、クロスオリジンの CSS 取得が完了するまで
      初回ペイントだけでなく <script type="module"> の実行（= アプリ起動）まで
      ブロックされる。display=swap のためフォント適用挙動は従来と変わらない。
      media="print" → onload で all に切替える標準パターン + JS 無効環境向け
      noscript フォールバック。preload で取得自体は最優先のまま維持する。
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400..900&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;600;700&family=Zen+Old+Mincho:wght@400;500;600;700;900&display=swap"

      rel="stylesheet"
      media="print"
      onload="this.onload=null;this.media='all'"
    />
