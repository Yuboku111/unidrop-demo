<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UniDrop — Demo</title>
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;background:#0f0a07;color:#f5ede2;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  h1{font-size:34px;letter-spacing:.04em;margin:0 0 12px;}
  p{opacity:.78;max-width:520px;line-height:1.7;margin:6px 0;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e8a35c;margin-right:8px;animation:p 1.2s infinite;}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  a{color:#e8a35c;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>UniDrop</h1>
    <p><span class="dot"></span>デモ（モック）サイトを準備中です</p>
    <p>大学生のためのキャンパスOS。ログイン不要で触れるデモをまもなく公開します。</p>
    <p>本番サービス: <a href="https://unidropjp.com">unidropjp.com</a></p>
  </div>
</body>
</html>
