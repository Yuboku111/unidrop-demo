<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#cf5a16" />
    <title>オフライン — UniDrop</title>
    <style>
      :root {
        --bg: #fbf4ec;
        --fg: #2e221a;
        --muted: #7a6a5c;
        --primary: #cf5a16;
        --border: #e7dccd;
        --card: #fffaf3;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          "Noto Sans JP",
          -apple-system,
          BlinkMacSystemFont,
          "Hiragino Kaku Gothic ProN",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 360px;
        text-align: center;
        padding: 36px 28px 32px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 12px 40px rgba(60, 40, 20, 0.1);
      }
      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        display: block;
        opacity: 0.92;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.01em;
        font-family:
          "Zen Old Mincho", "Noto Serif JP", "Hiragino Mincho ProN", Georgia,
          serif;
      }
      p {
        margin: 0;
        font-size: 14px;
        line-height: 1.85;
        color: var(--muted);
      }
      .status {
        margin-top: 22px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.02em;
      }
      .dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--primary);
        margin-right: 7px;
        vertical-align: middle;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="mark" src="/branding/logo/favicon-192.png" alt="UniDrop" />
      <h1>接続がありません</h1>
      <p>
        いまオフラインのようです。<br />
        電波の良い場所に移ると、自動でつながります。
      </p>
      <div class="status"><span class="dot"></span>再接続を待っています</div>
    </main>
    <script>
      // 接続が戻ったら自動で元のページへ戻る。
      window.addEventListener("online", function () {
        location.reload();
      });
    </script>
  </body>
</html>
